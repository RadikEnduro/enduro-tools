  // ── Photo store ──
  const zones = [

  function initPhotoZones() {
    zones.forEach(({ dz, fi, pg }) => {

  function handleFiles(files, pgKey, gridEl) {

  function applyOffset(img, ox, oy) {
    // Center the slightly oversized image then shift by pan offset
    img.style.left = `calc(-5% + ${ox}px)`;
    img.style.top  = `calc(-5% + ${oy}px)`;
  }

  function makeDraggable(img, photo) {
    let startX, startY, startOx, startOy, dragging = false;

    function clamp(val, min, max) { return Math.max(min, Math.min(max, val)); }

    function onStart(cx, cy) {
      dragging = true;
      startX = cx; startY = cy;
      startOx = photo.ox || 0; startOy = photo.oy || 0;
      img.classList.add('dragging');
    }
    function onMove(cx, cy) {
      if (!dragging) return;
      const dx = cx - startX, dy = cy - startY;
      const maxShift = img.parentElement ? img.parentElement.clientWidth * 0.1 : 30;
      photo.ox = clamp(startOx + dx, -maxShift, maxShift);
      photo.oy = clamp(startOy + dy, -maxShift, maxShift);
      applyOffset(img, photo.ox, photo.oy);
    }
    function onEnd() { dragging = false; img.classList.remove('dragging'); }

    // Mouse
    img.addEventListener('mousedown', e => { e.preventDefault(); onStart(e.clientX, e.clientY); });
    window.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
    window.addEventListener('mouseup', onEnd);
    // Touch
    img.addEventListener('touchstart', e => { e.preventDefault(); onStart(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
    window.addEventListener('touchmove', e => { if (dragging) { e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); } }, { passive: false });
    window.addEventListener('touchend', onEnd);
  }

  // Map pgKey → clear-button id
  const pgToClearBtn = {

    'pg-insp':   'pcb-insp',

  function renderGrid(pgKey, gridEl, animateLast) {
    gridEl.innerHTML = '';
    const total = photoStore[pgKey].length;
    photoStore[pgKey].forEach((photo, idx) => {
      const thumb = document.createElement('div');
      thumb.className = 'photo-thumb';
      // Animate only the newest photo (last in array) on add — no fade, slide from right
      if (animateLast && idx === total - 1) {
        thumb.classList.add('slide-in');
      }
      const img = document.createElement('img'); img.src = photo.dataUrl; img.alt = photo.name;
      img.draggable = false;
      applyOffset(img, photo.ox || 0, photo.oy || 0);
      makeDraggable(img, photo);

      const hint = document.createElement('div'); hint.className = 'pan-hint'; hint.textContent = 'drag to reframe';

      const btn = document.createElement('button'); btn.className = 'rm-btn'; btn.innerHTML = '✕'; btn.title = 'Remove';
      btn.onclick = () => { photoStore[pgKey].splice(idx, 1); renderGrid(pgKey, gridEl); };

      thumb.appendChild(img); thumb.appendChild(hint); thumb.appendChild(btn);
      gridEl.appendChild(thumb);
    });
    // Show/hide clear-photos button based on whether photos exist
    const cbId = pgToClearBtn[pgKey];
    if (cbId) {
      const cb = document.getElementById(cbId);
      if (cb) cb.classList.toggle('visible', photoStore[pgKey].length > 0);
    }
    // Update section clear button visibility
    const sec = pgToSection ? pgToSection[pgKey] : null;
    if (sec) updateSectionClearBtn(sec);

  // ── Section clear-button visibility ──
  // Maps section key → { bullets: [...listIds], photos: [...pgKeys], checks: [...checkboxIds], textareas: [...textareaIds] }
  const SECTION_DEF = {
    'signoff':     { bullets: [], photos: [], checks: ['chk-safety','chk-toolbox','chk-clean','chk-delays','chk-incident'], textareas: [] },
    'work-done':   { bullets: ['bl-work-done'],photos: ['pg-work'],  checks: [], textareas: [] },

  function sectionHasContent(section) {
    const def = SECTION_DEF[section];
    if (!def) return false;
    // Check bullet inputs
    for (const listId of def.bullets) {
      const el = document.getElementById(listId);
      if (el && Array.from(el.querySelectorAll('.bullet-row input')).some(i => i.value.trim().length > 0)) return true;
    }
    // Check photos
    for (const pgKey of def.photos) {
      if (photoStore[pgKey] && photoStore[pgKey].length > 0) return true;
    }
    // Check checkboxes
    for (const chkId of def.checks) {
      const el = document.getElementById(chkId);
      if (el && el.checked) return true;
    }
    // Check textareas
    for (const taId of def.textareas) {
      const el = document.getElementById(taId);
      if (el && el.value.trim().length > 0) return true;
    }
    return false;
  }

  // ── Checklist inline attach ──
  function handleChkAttach(input, previewId, clearBtnId) {
    const preview = document.getElementById(previewId);
    if (!preview) return;
    const files = Array.from(input.files);
    files.forEach(file => {
      if (file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const photo = { ox: 0, oy: 0 }; // drag state object

          const wrap = document.createElement('div');
          wrap.className = 'chk-attach-wrap';

          const img = document.createElement('img');
          img.src = e.target.result;
          img.className = 'chk-attach-thumb';
          img.title = file.name;
          img.draggable = false;
          applyOffset(img, 0, 0);
          makeDraggable(img, photo);

          const hint = document.createElement('div');
          hint.className = 'pan-hint';
          hint.textContent = 'drag to reframe';

          wrap.appendChild(img);
          wrap.appendChild(hint);

          // Insert before the clear button if it exists
          const clearBtn = clearBtnId ? document.getElementById(clearBtnId) : null;
          if (clearBtn) preview.insertBefore(wrap, clearBtn);
          else preview.appendChild(wrap);
        };
        reader.readAsDataURL(file);
      } else {
        const tag = document.createElement('span');
        tag.className = 'chk-attach-file';
        tag.textContent = '📎 ' + file.name;
        const clearBtn = clearBtnId ? document.getElementById(clearBtnId) : null;
        if (clearBtn) preview.insertBefore(tag, clearBtn);
        else preview.appendChild(tag);
      }
    });
    // Show clear button if items were added
    if (clearBtnId && files.length > 0) {
      const cb = document.getElementById(clearBtnId);
      if (cb) cb.classList.add('visible');
    }
  }

  function addBullet(listId, value='', focus=true) {
    const list = document.getElementById(listId);
    const row = document.createElement('div');
    row.className = 'bullet-row';
    row.draggable = true;

    const handle = document.createElement('span');
    handle.className = 'drag-handle'; handle.textContent = '⠿'; handle.title = 'Drag to reorder';

    input.type = 'text';
    input.placeholder = '';

    input.addEventListener('keydown', e => {

    del.onclick = () => {
      if (list.children.length > 1) row.remove(); else input.value = '';
      const sec = blToSection[listId];
      if (sec) updateSectionClearBtn(sec);

    // Drag reorder
    row.addEventListener('dragstart', e => {

      e.dataTransfer.effectAllowed = 'move';
    });
    row.addEventListener('dragend', () => row.classList.remove('dragging-row'));
    row.addEventListener('dragover', e => {
      e.preventDefault();
      const dragging = list.querySelector('.dragging-row');
      if (dragging && dragging !== row) {
        const rect = row.getBoundingClientRect();
        const mid = rect.top + rect.height / 2;
        list.insertBefore(dragging, e.clientY < mid ? row : row.nextSibling);
      }
    });

    row.appendChild(handle); row.appendChild(dot); row.appendChild(input); row.appendChild(del);

    list.appendChild(row);
    if (focus) input.focus();
    return input;
  }

  // Bullet init moved to DOMContentLoaded

  // ── GPT grammar/spelling fix ──
  async function fixTextWithGPT(lines) {
    if (!lines.length) return lines;
    try {
      const prompt = `Fix spelling and grammar in each of these bullet points. Keep the same meaning and construction language. Return ONLY a JSON array of strings, same order, no extra text:
${JSON.stringify(lines)}`;
      const res = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${_k}` },
        body: JSON.stringify({ model: 'gpt-4o-mini', messages: [{ role: 'user', content: prompt }], temperature: 0 })
      });
      if (!res.ok) return lines;
      const data = await res.json();
      const content = data.choices[0].message.content.trim();
      const fixed = JSON.parse(content.replace(/^```json|```$/g, '').trim());
      return Array.isArray(fixed) ? fixed : lines;
    } catch(e) { return lines; }
  }

  async function fixAllBullets() {
    const tasks = BULLET_LISTS.map(async listId => {
      const rows = Array.from(document.getElementById(listId).querySelectorAll('.bullet-row'));
      const lines = rows.map(r => r.querySelector('input').value.trim()).filter(v => v);
      if (!lines.length) return;
      const fixed = await fixTextWithGPT(lines);
      let fi = 0;
      rows.forEach(r => {
        const inp = r.querySelector('input');
        if (inp.value.trim()) { inp.value = fixed[fi++] || inp.value; }
      });
    });
    await Promise.all(tasks);
  }

  // ── Toast ──
  function showToast(msg, isError) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (isError ? ' error' : '');
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 3500);
  }

  // ── Slug helper for filenames ──
  function slug(str) { return (str || '').replace(/[^a-zA-Z0-9]/g, ''); }

  // ── Build PDF title ──
  function buildTitle() {
    const site = (document.getElementById('f-site').value.trim() || 'Site').replace(/[^a-zA-Z0-9 ]/g, '').trim();
    const sup  = (document.getElementById('f-super').value.trim() || '').replace(/[^a-zA-Z0-9 ]/g, '').trim();
    const week = (document.getElementById('f-week').value.trim() || '?');
    const date = (document.getElementById('f-date').value || '').replace(/-/g, '-');
    return `Enduro Construction — Weekly Progress Report — ${site} — W${week} — ${sup}${date ? ' — ' + date : ''}`;
  }

  function updateFilenameNote() {
    const el = document.getElementById('pf-filename');
    if (el) el.textContent = buildTitle() + '.pdf';
  }

  // Update filename note whenever meta fields change
  ['f-site','f-super','f-week','f-date'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', updateFilenameNote);
  });
  updateFilenameNote(); // set on load

  // ── checkMetaComplete is defined in the first script block above ──
  // Run on load and after async prefills
  checkMetaComplete();
  setTimeout(checkMetaComplete, 300);

  // ── Validation ──
  function flashRedOverlay(el) {
    // Scroll element into view, then wait until scrolling has fully stopped
    // before measuring position — prevents overlay rendering at wrong position
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });

    let scrollTimer = null;
    const scroller = document.getElementById('view-form') || document.querySelector('.form-scroll-host') || window;

    function onScroll() {
      clearTimeout(scrollTimer);
      scrollTimer = setTimeout(doFlash, 120); // 120ms of no scroll = settled
    }

    function doFlash() {
      scroller.removeEventListener('scroll', onScroll);
      const rect = el.getBoundingClientRect();
      const overlay = document.createElement('div');
      overlay.style.cssText = `
        position: fixed;
        pointer-events: none;
        z-index: 99999;
        border-radius: 6px;
        background: rgba(228,51,56,0.18);
        box-shadow: 0 0 0 2px rgba(228,51,56,0.55);
        animation: redFlash 1.6s ease-out forwards;
        top: ${rect.top}px;
        left: ${rect.left}px;
        width: ${rect.width}px;
        height: ${rect.height}px;
      `;
      document.body.appendChild(overlay);
      setTimeout(() => overlay.remove(), 2000);
    }

    // Start listening; also set a max-wait fallback of 900ms
    scroller.addEventListener('scroll', onScroll, { passive: true });
    scrollTimer = setTimeout(() => {
      scroller.removeEventListener('scroll', onScroll);
      doFlash();
    }, 900);
  }

  function highlightField(el) {
    flashRedOverlay(el);
  }

  function highlightDropZone(dzId) {
    const el = document.getElementById(dzId);
    flashRedOverlay(el);
  }

  function validate() {
    const siteEl = document.getElementById('f-site');
    const supEl  = document.getElementById('f-super');
    const weekEl = document.getElementById('f-week');
    const site   = siteEl.value.trim();
    const sup    = supEl.value.trim();
    const week   = weekEl.value.trim();
    const done   = getBullets('bl-work-done').join(' ');
    const next   = getBullets('bl-work-next').join(' ');
    const wPics  = photoStore['pg-work'].length;
    const nPics  = photoStore['pg-next'].length;

    if (!site)       { showToast('⚠ Required: Site name missing', true); highlightField(siteEl); return false; }
    if (!sup)        { showToast('⚠ Required: Superintendent missing', true); highlightField(supEl); return false; }
    if (!week)       { showToast('⚠ Required: Week number missing', true); highlightField(weekEl); return false; }
    if (!done)       {
      showToast('⚠ Required: Add at least one bullet to Work Accomplished', true);
      const inp = document.getElementById('bl-work-done').querySelector('input');
      highlightField(inp); return false;
    }
    if (wPics === 0) { showToast('⚠ Required: Add a photo to Work Accomplished', true); highlightDropZone('dz-work'); return false; }
    if (!next)       {
      showToast('⚠ Required: Add at least one bullet to Next Week', true);
      const inp = document.getElementById('bl-work-next').querySelector('input');
      highlightField(inp); return false;
    }
    if (nPics === 0) { showToast('⚠ Required: Add a photo to Next Week', true); highlightDropZone('dz-next'); return false; }

    // Delay/Incident note required when checked
    const delayChecked = document.getElementById('chk-delays').checked;
    const delayNote = (document.getElementById('note-chk-delay') || {}).value || '';
    if (delayChecked && !delayNote.trim()) {
      showToast('⚠ Required: Add a note for Anticipated Delay', true);
      const noteEl = document.getElementById('note-chk-delay');
      noteEl.classList.add('required-field');
      noteEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
      noteEl.focus();
      return false;
    }
    const incidentChecked = document.getElementById('chk-incident').checked;
    const incidentNote = (document.getElementById('note-chk-incident') || {}).value || '';
    if (incidentChecked && !incidentNote.trim()) {
      showToast('⚠ Required: Add a note for Incident / Near-Miss', true);
      const noteEl = document.getElementById('note-chk-incident');
      noteEl.classList.add('required-field');
      noteEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
      noteEl.focus();
      return false;
    }

    return true;
  }

  // ── Build preview HTML ──
  function buildPreview() {
    const site  = document.getElementById('f-site').value.trim();
    const sup   = document.getElementById('f-super').value.trim();
    const week  = document.getElementById('f-week').value.trim();
    const date  = document.getElementById('f-date').value;

    // Meta row
    const metaEl = document.getElementById('pv-meta');
    metaEl.innerHTML = [
      { label: 'Site', val: site },
      { label: 'Superintendent', val: sup },
      { label: 'Week', val: week ? `#${week}` : '—' },
      { label: 'Date', val: date || '—' },
    ].map(m => `<div class="preview-meta-item"><div class="pm-label">${m.label}</div><div class="pm-value">${m.val || '—'}</div></div>`).join('');

    // ── Helper: render one section block (card-container style) ──
    function renderSection(s) {
      const bullets = getBullets(s.bl);
      const photos  = photoStore[s.pg];
      const photoHtml = photos.length
        ? `<div class="pv-photo-grid">${photos.map(p => `<div class="pv-photo-wrap"><img src="${p.dataUrl}" alt="${p.name}"></div>`).join('')}</div>`
        : '';
      const isEmpty = !bullets.length && !photos.length;
      return `<div class="pv-card">
        <div class="pv-card-head"><h3>${s.title}</h3></div>
        <div class="pv-card-body">
          ${bullets.length ? `<ul class="pv-bullets">${bullets.map(b=>`<li><span class="pv-dot">•</span><span>${b.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span></li>`).join('')}</ul>` : (isEmpty ? '<p class="preview-empty">—</p>' : '')}
          ${photoHtml}
        </div>
      </div>`;
    }

    // ── Helper: collect images from a chk-attach-preview container ──
    function getChkAttachImgs(previewId) {
      const container = document.getElementById(previewId);
      if (!container) return [];
      return Array.from(container.querySelectorAll('img.chk-attach-thumb')).map(img => img.src);
    }

    // Checkboxes — with attached photo grids per row
    const checks = [
      { id: 'chk-safety',   label: 'Weekly Safety Form Submitted',  previewId: 'chk-safety-preview'  },
      { id: 'chk-toolbox',  label: 'Toolbox Talk Completed',         previewId: 'chk-toolbox-preview' },
      { id: 'chk-clean',    label: 'Site Clean & Secure',            previewId: 'chk-clean-preview'   },
      { id: 'chk-delays',   label: 'Anticipated Delay',              previewId: null },
      { id: 'chk-incident', label: 'Incident / Near-Miss Occurred',  previewId: null },
    ];

    // Build each checklist row: checkbox + label, optional note, then photos underneath
    const checkRowsHtml = checks.map(c => {
      const checked  = document.getElementById(c.id).checked;
      const imgs     = c.previewId ? getChkAttachImgs(c.previewId) : [];
      // For delay/incident, pull note text from note textarea
      const noteId   = c.id === 'chk-delays' ? 'note-chk-delay' : (c.id === 'chk-incident' ? 'note-chk-incident' : null);
      const noteText = noteId && checked ? ((document.getElementById(noteId) || {}).value || '').trim() : '';
      const noteHtml = noteText ? true : false; // rendered via pv-check-note class in row
      const imgHtml  = imgs.length
        ? `<div class="pv-check-imgs">${imgs.map(src => `<div class="pv-photo-wrap"><img src="${src}" alt=""></div>`).join('')}</div>`
        : '';
      return `<div class="pv-check-row${(noteHtml || imgHtml) ? ' pv-check-row--has-detail' : ''}">
        <div class="pv-check-item"><div class="pv-check-box ${checked ? 'checked' : ''}">${checked ? '✓' : ''}</div><span class="pv-check-label">${c.label}</span></div>
        ${noteHtml ? `<div class="pv-check-note">${noteText.replace(/\n/g,'<br>')}</div>` : ''}
        ${imgHtml}
      </div>`;
    }).join('');

    let html = '';

    // 0. Site Sign-Off — card style
    html += `<div class="pv-card">
      <div class="pv-card-head"><h3>Site Sign-Off</h3></div>
      <div class="pv-card-body">
        <div class="pv-checklist">${checkRowsHtml}</div>
      </div>
    </div>`;

    // 1. Work Accomplished — full width card
    html += renderSection({ bl: 'bl-work-done', pg: 'pg-work', title: 'Work Accomplished' });

    // 2. Work Scheduled for Next Week — full width card
    html += renderSection({ bl: 'bl-work-next', pg: 'pg-next', title: 'Work Scheduled for Next Week' });

    // 3. Inspections — full width card
    html += renderSection({ bl: 'bl-inspections', pg: 'pg-insp',  title: 'Inspections / Reviews Next Week' });

    // 4. Comments on Schedule — full width card
    html += renderSection({ bl: 'bl-schedule',    pg: 'pg-sched', title: 'Comments on Schedule' });

    // 5. Urgent — full width card
    html += renderSection({ bl: 'bl-urgent', pg: 'pg-urgent', title: 'Urgent Action Items / Approvals Required' });

    document.getElementById('pv-body').innerHTML = html;
  }

  // ── Open preview ──
  // ── Dev mode toggle ──

  // ════════════════════════════════════════
  // STARRED (MARKETING) PHOTOS — collected from report photo grids
  // ════════════════════════════════════════
  // Returns all photos across all sections that have been starred
  function getStarredPhotos() {
    const starred = [];
    Object.keys(photoStore).forEach(pgKey => {
      photoStore[pgKey].forEach(photo => {
        if (photo.starred) starred.push({ pgKey, photo });
      });
    });
    return starred;
  }

  // Placeholder upload — wire to Cloudflare Worker when ready
  async function uploadMarketingPhotos() {
    // No-op: starred photos live in photoStore; future upload logic goes here
  }

  // ── All Forms confirm modal ──
  function confirmAllForms() {
    document.getElementById('confirmOverlay').classList.add('show');
  }
  function closeConfirm(e) {
    // Close if clicking the backdrop, not the modal itself
    if (e && e.target !== document.getElementById('confirmOverlay')) return;
    document.getElementById('confirmOverlay').classList.remove('show');
  }
  function goAllForms() {
    document.getElementById('confirmOverlay').classList.remove('show');
    showView('index');
  }

  // Called by parent index when form is already preloaded — refreshes employee/site fields
  function reloadFromSession() {
    try {
      const emp  = sessionStorage.getItem('enduro_login_employee');
      const site = sessionStorage.getItem('enduro_login_site');
      if (emp)  { const el = document.getElementById('f-super'); if (el) el.value = emp; }
      if (site) { const el = document.getElementById('f-site');  if (el) el.value = site; }
    } catch(e) {}
    // Always reset date to today when form re-opens
    if (typeof window._setTodayDate === 'function') window._setTodayDate();
    if (typeof checkMetaComplete === 'function') checkMetaComplete();
  }
  // Close on Escape
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') document.getElementById('confirmOverlay').classList.remove('show');
  });

  let _formDevMode = false;
  function _formToggleDev() {
    _formDevMode = !devMode;
    document.getElementById('dev-banner').classList.toggle('show', devMode);
    const btn = document.getElementById('form-dev-toggle');
    btn.textContent = devMode ? 'dev ON' : 'dev';
    btn.classList.toggle('active', devMode);
  }

  function downloadPDF() {
    // Trigger full preview then print dialog (Save as PDF)
    if (!_formDevMode && !validate()) return;
    buildPreview();
    document.title = buildTitle();
    document.getElementById('previewOverlay').classList.add('show');
    document.body.style.overflow = 'hidden';
    // Small delay to let preview render, then trigger print
    setTimeout(() => window.print(), 400);
  }

  function openPreview() {
    if (!_formDevMode && !validate()) return;
    buildPreview();
    document.title = buildTitle();
    document.getElementById('previewOverlay').classList.add('show');
    document.getElementById('previewOverlay').scrollTop = 0;
  }

  // ── Close preview ──
  function closePreview() {
    document.getElementById('previewOverlay').classList.remove('show');
    document.title = 'Enduro — Weekly Report';
  }

  // ── Reset entire form ──
  function resetForm() {
    if (!confirm('Clear the entire form? All entries and photos will be lost.')) return;
    // Clear meta fields
    ['f-site','f-super','f-week'].forEach(id => document.getElementById(id).value = '');
    if (typeof window._setTodayDate === 'function') window._setTodayDate();
    else document.getElementById('f-date').value = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    // Clear bullet lists and re-init
    BULLET_LISTS.forEach(id => document.getElementById(id).innerHTML = '');
    ['bl-work-done','bl-work-next'].forEach(id => { addBullet(id, '', false); });
    ['bl-inspections','bl-schedule'].forEach(id => { addBullet(id, '', false); });
    addBullet('bl-urgent', '', false);
    // Clear photos
    Object.keys(photoStore).forEach(k => { photoStore[k] = []; });
    ['pg-work','pg-next','pg-insp','pg-sched','pg-urgent'].forEach(id => {
      const el = document.getElementById(id); if (el) el.innerHTML = '';
    });
    // Clear checkboxes
    ['chk-safety','chk-toolbox','chk-clean','chk-delays','chk-incident'].forEach(id => {
      document.getElementById(id).checked = false;
    });
    // Reset delay/incident attach labels, expand areas, and note text
    const delayAttach    = document.getElementById('chk-delay-attach');
    const incidentAttach = document.getElementById('chk-incident-attach');
    if (delayAttach)    delayAttach.style.display    = 'none';
    if (incidentAttach) incidentAttach.style.display = 'none';
    const delayExpand    = document.getElementById('chk-delay-expand');
    const incidentExpand = document.getElementById('chk-incident-expand');
    if (delayExpand)    delayExpand.style.display    = 'none';
    if (incidentExpand) incidentExpand.style.display = 'none';
    const noteDelay    = document.getElementById('note-chk-delay');
    const noteIncident = document.getElementById('note-chk-incident');
    if (noteDelay)    noteDelay.value    = '';
    if (noteIncident) noteIncident.value = '';
    ['chk-delay-preview','chk-incident-preview'].forEach(id => {
      const el = document.getElementById(id);
      if (el) { const cb = el.querySelector('.chk-clear-btn'); el.innerHTML = ''; if (cb) el.appendChild(cb); }
    });
    updateFilenameNote();
    (document.getElementById('view-form') || window).scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ── Save as PDF (html2canvas + jsPDF — direct download, no print dialog) ──
  async function savePDF() {
    // Target whichever download button is visible (preview page or form page)
    const btn = document.querySelector('.pv-btn-download') || document.querySelector('.form-preview-btn');
    const origHTML = btn ? btn.innerHTML : '';
    if (btn) { btn.innerHTML = 'Generating…'; btn.disabled = true; }
    showToast('Building PDF — please wait…');
    showToast('Building PDF — please wait…');

    try {
      // Capture only the white content card — margins are applied by jsPDF separately
      const doc = document.getElementById('previewDocInner');

      const canvas = await html2canvas(doc, {
        scale: 3,
        useCORS: true,
        backgroundColor: '#ffffff',
        logging: false,
        windowWidth: doc.scrollWidth,
        windowHeight: doc.scrollHeight
      });

      const { jsPDF } = window.jspdf;
      const imgData = canvas.toDataURL('image/jpeg', 0.95);
      const margin = 10.16; // 0.4 in = 10.16 mm — all four sides
      const pdfW = 215.9;  // Letter width mm
      const imgW = pdfW - margin * 2;
      const imgH = (canvas.height / canvas.width) * imgW;
      const pdfH = imgH + margin * 2;
      const pdf = new jsPDF({ orientation: 'p', unit: 'mm', format: [pdfW, pdfH] });
      pdf.addImage(imgData, 'JPEG', margin, margin, imgW, imgH);
      pdf.save(buildTitle() + '.pdf');
      showToast('PDF downloaded — attach to your Outlook email.');

      // ── Upload marketing photos to R2 in background ──
      uploadMarketingPhotos();
    } catch(e) {
      showToast('PDF generation failed — try again.', true);
      console.error(e);
    }

    if (btn) { btn.innerHTML = origHTML; btn.disabled = false; }
  }

  // ── Build email body ──
  function buildEmailBody() {
    const site = document.getElementById('f-site').value.trim();
    const sup  = document.getElementById('f-super').value.trim();
    const week = document.getElementById('f-week').value.trim();
    const date = document.getElementById('f-date').value;

    const fields = [
      { label: 'SITE',             val: site },
      { label: 'SUPERINTENDENT',   val: sup },
      { label: 'WEEK',             val: week },
      { label: 'DATE',             val: date },
    ];

    const sections = [
      { label: 'WORK ACCOMPLISHED',             bl: 'bl-work-done'   },
      { label: 'WORK SCHEDULED FOR NEXT WEEK',  bl: 'bl-work-next'   },
      { label: 'INSPECTIONS / REVIEWS',         bl: 'bl-inspections' },
      { label: 'COMMENTS ON SCHEDULE',          bl: 'bl-schedule'    },
      { label: 'URGENT ACTION ITEMS',           bl: 'bl-urgent'      },
    ];

    const checks = [
      { label: 'Weekly Safety Form Submitted', id: 'chk-safety'   },
      { label: 'Toolbox Talk Completed',       id: 'chk-toolbox'  },
      { label: 'Site Clean & Secure',          id: 'chk-clean'    },
      { label: 'No Major Delays',              id: 'chk-delays'   },
      { label: 'Incident / Near-Miss',         id: 'chk-incident' },
    ];

    let body = `ENDURO CONSTRUCTION — WEEKLY PROGRESS REPORT\n${'='.repeat(48)}\n\n`;
    fields.forEach(f => { body += `${f.label}: ${f.val || '—'}\n`; });
    body += '\n';
    sections.forEach(s => {
      const val = getBullets(s.bl).map((b,i)=>`${i+1}. ${b}`).join('\n');
      if (val) body += `${s.label}\n${'-'.repeat(32)}\n${val}\n\n`;
    });
    body += `SITE SIGN-OFF\n${'-'.repeat(32)}\n`;
    checks.forEach(c => { body += `[${document.getElementById(c.id).checked ? '✓' : ' '}] ${c.label}\n`; });
    if (document.getElementById('chk-incident').checked) {
      const incNote = (document.getElementById('note-chk-incident') || {}).value || '';
      body += `\n⚠ INCIDENT / NEAR-MISS:\n${incNote || '(No details provided)'}\n`;
    }
    if (document.getElementById('chk-delays').checked) {
      const delNote = (document.getElementById('note-chk-delay') || {}).value || '';
      body += `\n⚠ ANTICIPATED DELAY:\n${delNote || '(No details provided)'}\n`;
    }
    const totalPhotos = Object.values(photoStore).reduce((a,b) => a + b.length, 0);
    if (totalPhotos > 0) {
      body += `\n${'='.repeat(48)}\n⚠ ${totalPhotos} site photo(s) captured. Attach the saved PDF to this email.\n`;
    }
    return body;
  }

  // ── Send via Outlook ──
  function sendOutlook() {
    const site  = document.getElementById('f-site').value.trim();
    const week  = document.getElementById('f-week').value.trim();
    const date  = document.getElementById('f-date').value;
    const subject = `Weekly Report — ${site} — Week ${week || '?'} — ${date || 'Undated'}`;
    const body    = buildEmailBody();
    const to      = 'joel@enduroconstruction.ca,fred@enduroconstruction.ca';

    const mailtoLink = `mailto:${to}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    window.location.href = mailtoLink;
    showToast('Opening your mail app… attach the PDF before sending.');
  }
