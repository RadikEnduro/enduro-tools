<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enduro Construction — Forms</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:  #073544;
      --red:   #E43338;
      --yellow: #E3FF17;
      --white: #ffffff;
      --grey:  #f4f4f4;
    }

    body {
      font-family: 'Inter', Arial, sans-serif;
      background: var(--navy);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* Logo */
    .logo {
      margin-bottom: 56px;
    }
    .logo svg {
      height: 64px;
      width: auto;
      display: block;
    }

    /* Form buttons */
    .form-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 480px;
    }

    .form-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--yellow);
      color: var(--navy);
      text-decoration: none;
      padding: 18px 28px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.4px;
      transition: background 0.15s, transform 0.1s;
      cursor: pointer;
      border: none;
      width: 100%;
      font-family: 'Inter', Arial, sans-serif;
    }

    .form-btn:hover {
      background: #d4ef00;
      transform: translateX(3px);
    }

    .form-btn .arrow {
      font-size: 18px;
      font-weight: 400;
      flex-shrink: 0;
      margin-left: 16px;
    }

    /* Disabled / coming soon */
    .form-btn.disabled {
      background: rgba(227, 255, 23, 0.15);
      color: rgba(227, 255, 23, 0.4);
      cursor: default;
      pointer-events: none;
    }
    .form-btn.disabled:hover {
      transform: none;
    }

    /* Footer */
    .footer {
      margin-top: 60px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: rgba(255,255,255,0.2);
    }

    /* Mobile */
    @media (max-width: 600px) {
      .logo { margin-bottom: 40px; }
      .logo svg { height: 48px; }
      .form-btn { padding: 16px 22px; font-size: 11px; }
    }
  </style>
</head>
